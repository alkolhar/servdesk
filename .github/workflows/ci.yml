name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # Runs compile, unit + Testcontainers/PostgreSQL integration tests, ArchUnit rules, Spotless
      # format check and JaCoCo coverage reporting (all wired into the verify phase — see pom.xml).
      # The Docker daemon Testcontainers needs is preinstalled on GitHub-hosted ubuntu runners.
      - name: Build and verify
        run: ./mvnw --batch-mode verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Not a blocking gate yet: this is the first time SpotBugs runs against a JDK it was actually
      # built to support (the project's own machine used to author this pipeline is on a newer JDK
      # where SpotBugs's bundled ASM can't parse the platform's own class files — see pom.xml).
      # Remove continue-on-error once a real run here has been observed green.
      - name: Static analysis (SpotBugs)
        continue-on-error: true
        run: ./mvnw --batch-mode spotbugs:check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Build container image
        run: docker build -t servdesk:ci .

  # Verifies the running app never drifts from static/openapi/servdesk-api.yaml. Runs as its own CI
  # job (not part of `./mvnw verify`) using each tool's own officially-supported integration —
  # schemathesis/action for Schemathesis, and Redocly CLI via npx (Node is preinstalled on
  # GitHub-hosted ubuntu runners, same basis as Docker in build-and-test above) — rather than
  # shelling out to either from inside a JUnit test.
  contract-tests:
    runs-on: ubuntu-latest
    # Most failure surface of any job here (a backgrounded app process, a polling readiness loop, two
    # external tools) — bound it rather than falling back to the platform default.
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: servdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d servdesk"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build the jar
        run: ./mvnw --batch-mode package -DskipTests

      - name: Start the app against the PostgreSQL service container
        run: |
          java -jar target/*.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/servdesk \
            --spring.datasource.username=postgres \
            --spring.datasource.password=root &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/setup && exit 0
            sleep 2
          done
          echo "App never became ready" >&2
          exit 1

      # Fixture-only credentials for this CI run's disposable PostgreSQL service container — not a
      # real secret, same admin/admin123 pattern the integration tests already bootstrap with.
      - name: Bootstrap the first agent
        run: |
          curl -sf -X POST http://localhost:8080/api/setup -H "Content-Type: application/json" \
            -d '{"name":"Administrator","email":"admin@example.com","username":"admin","password":"admin123"}'

      - name: Lint and bundle the OpenAPI contract (Redocly CLI)
        run: |
          npx --yes @redocly/cli@2.39.0 lint
          npx --yes @redocly/cli@2.39.0 bundle main -o /tmp/bundled-openapi.yaml

      - name: Verify the running app matches the contract (Schemathesis)
        uses: schemathesis/action@v3
        with:
          schema: /tmp/bundled-openapi.yaml
          base-url: http://localhost:8080
          checks: not_a_server_error,status_code_conformance,content_type_conformance,response_schema_conformance
          # base64 of admin:admin123 — the fixture credentials bootstrapped above
          authorization: "Basic YWRtaW46YWRtaW4xMjM="
          max-examples: 10
