services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: servdesk
      POSTGRES_USER: servdesk
      POSTGRES_PASSWORD: servdesk
    ports:
      - "5432:5432"
    volumes:
      - servdesk-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servdesk -d servdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/servdesk
      SPRING_DATASOURCE_USERNAME: servdesk
      SPRING_DATASOURCE_PASSWORD: servdesk
    ports:
      - "8080:8080"

volumes:
  servdesk-db-data:
