          format: int64
          nullable: true
        requesterId:
          type: integer
          format: int64
        assigneeId:
          type: integer
          format: int64
          nullable: true
        teamId:
          type: integer
          format: int64
          nullable: true
    ServiceRequestUpdateRequest:
      type: object
      required: [status, subject, requesterId]
      properties:
        status:
          $ref: "#/components/schemas/TicketStatus"
        subject:
          type: string
        description:
          type: string
          nullable: true
        categoryId:
          type: integer
          format: int64
          nullable: true
        priorityId:
          type: integer
          format: int64
          nullable: true
        requesterId:
          type: integer
          format: int64
        assigneeId:
          type: integer
          format: int64
          nullable: true
        teamId:
          type: integer
          format: int64
          nullable: true
    ServiceRequestPage:
      type: object
      description: Spring HATEOAS PagedModel<ServiceRequestModel>.
      properties:
        _embedded:
          type: object
          properties:
            serviceRequestModelList:
              type: array
              items:
                $ref: "#/components/schemas/ServiceRequestModel"
        _links:
          type: object
          description: first/prev/self/next/last, as available.
        page:
          $ref: "#/components/schemas/PageMetadata"
    CommentModel:
      type: object
      description: >
        An entry in a ticket's activity/conversation history. No self link: unlike every other
        resource in this API, an individual comment has no findById-style endpoint of its own — only
        create + list on the collection.
      properties:
        id:
          type: integer
          format: int64
        ticketId:
          type: integer
          format: int64
        authorId:
          type: integer
          format: int64
        body:
          type: string
        internal:
          type: boolean
          description: >
            Hidden from the requester when true. Only an Agent-authored comment may set this — see
            ForbiddenProblem.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
          nullable: true
        updatedBy:
          type: string
          nullable: true
    CommentCreateRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
        internal:
          type: boolean
          default: false
    CommentCollection:
      type: object
      description: Spring HATEOAS CollectionModel<CommentModel> — not paginated.
      properties:
        _embedded:
          type: object
          properties:
            commentModelList:
              type: array
              items:
                $ref: "#/components/schemas/CommentModel"
        _links:
          type: object
          description: self.
    PageMetadata:
      type: object
      properties:
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
    SetupStatus:
      type: object
      properties:
        setupRequired:
          type: boolean
    SetupRequest:
      type: object
      required: [name, email, username, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        username:
          type: string
        password:
          type: string
          format: password
