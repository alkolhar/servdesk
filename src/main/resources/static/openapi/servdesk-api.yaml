          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TicketStatus"
        - name: requesterId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: assigneeId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: teamId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: priorityId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
      responses:
        "default":
          $ref: "#/components/responses/DefaultProblem"
        "200":
          description: A page of tickets across all subtypes.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/TicketPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/tickets/{id}:
    parameters:
      - $ref: "#/components/parameters/ApiVersionHeader"
      - name: id
        in: path
        required: true
        description: The shared Ticket id (ADR-0001) — same value as the subtype's own `id`.
        schema:
          type: integer
          format: int64
    get:
      tags: [tickets]
      summary: >
        Fetch a ticket by its shared id, regardless of subtype. Answers 404 for a Customer caller
        who is not the ticket's requester — indistinguishable from a missing id.
      responses:
        "default":
          $ref: "#/components/responses/DefaultProblem"
        "200":
          description: The ticket.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/TicketModel"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
  /api/tickets/{ticketId}/comments:
    parameters:
      - $ref: "#/components/parameters/ApiVersionHeader"
      - name: ticketId
        in: path
        required: true
        description: The shared Ticket id (ADR-0001) — same value as any subtype's own `id`.
        schema:
          type: integer
          format: int64
    get:
      tags: [comments]
      summary: >
        List a ticket's comments in one combined, chronological stream. A Customer caller only ever
        sees non-internal comments; an Agent sees both.
      responses:
        "default":
          $ref: "#/components/responses/DefaultProblem"
        "200":
          description: The ticket's comments.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/CommentCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
    post:
      tags: [comments]
      summary: >
        Add a comment to a ticket. `internal=true` is rejected (403) unless the caller is an Agent —
        "internal" means "hidden from the requester," which a Customer can't set on their own comment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "default":
          $ref: "#/components/responses/DefaultProblem"
        "201":
          description: Comment created.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/CommentModel"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  parameters:
    ApiVersionHeader:
      name: X-API-Version
      in: header
      required: false
      description: Defaults to "1" if omitted (see ApiVersioningConfig).
      schema:
        type: string
        default: "1"
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
    SortParam:
      name: sort
      in: query
      required: false
      description: 'e.g. "name,asc" — repeatable for multi-field sort.'
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ValidationProblem:
      description: Request body failed Jakarta Bean Validation.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFoundProblem:
      description: No resource with that id.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ForbiddenProblem:
      description: >
        The caller is authenticated but not allowed to perform this action — either a static
        URL+role rule (e.g. Customer attempting an Agent-only write) or a data-dependent one (e.g. a
        Customer's comment requesting internal=true).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    DefaultProblem:
      description: >
        Any other error not called out explicitly above for this operation — e.g. an unsupported
        X-API-Version header (400, ApiVersioningConfig) or missing/invalid credentials (401) on an
        endpoint where that wasn't already listed. Always RFC 7807 ProblemDetail.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ConflictProblem:
      description: >
        A DB-level constraint was violated — a referenced id (e.g. teamId, categoryId, requesterId,
        parentId, relatedProblemId) doesn't exist, or a unique column (e.g. a soft-deleted row's still
        -occupied email/username/name) collides. Surfaces as DataIntegrityViolationException, mapped
        to 409 by RestExceptionHandler rather than a domain-level exception, since the service layer
        never sees this coming.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
  schemas:
    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details, as produced by common.web.RestExceptionHandler.
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    PersonRole:
      type: string
      enum: [AGENT, CUSTOMER]
    PersonModel:
      type: object
      properties:
        id:
          type: integer
          format: int64
        role:
          $ref: "#/components/schemas/PersonRole"
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        enabled:
          type: boolean
        teamId:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
          nullable: true
        updatedBy:
          type: string
          nullable: true
        _links:
          type: object
          description: HATEOAS links (self).
    PersonCreateRequest:
      type: object
      required: [role, name, email]
      properties:
        role:
          $ref: "#/components/schemas/PersonRole"
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
        teamId:
          type: integer
          format: int64
          nullable: true
    PersonUpdateRequest:
      type: object
      required: [role, name, email, enabled]
      properties:
        role:
          $ref: "#/components/schemas/PersonRole"
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
          description: Null leaves the existing password unchanged.
        enabled:
          type: boolean
        teamId:
          type: integer
          format: int64
          nullable: true
    PersonPage:
      type: object
      description: Spring HATEOAS PagedModel<PersonModel>.
      properties:
        _embedded:
          type: object
          properties:
            personModelList:
              type: array
              items:
                $ref: "#/components/schemas/PersonModel"
        _links:
          type: object
          description: first/prev/self/next/last, as available.
        page:
