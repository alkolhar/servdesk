        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [persons]
      summary: Create a person (agent or customer).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonCreateRequest"
      responses:
        "default":
          $ref: "#/components/responses/DefaultProblem"
        "201":
          description: Person created.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/PersonModel"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/ConflictProblem"
  /api/persons/{id}:
    parameters:
      - $ref: "#/components/parameters/ApiVersionHeader"
      - name: id
