openapi: 3.0.3
info:
  title: servdesk API
  description: >
    ITSM ticketing API. This file is the hand-authored contract (contract-first, no
    code generation in either direction) — the implementation under
    dev.alkolhar.servdesk is written to match it, not generated from it.
  version: "1"
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
tags:
  - name: setup
    description: One-shot, pre-auth bootstrap of the first agent account.
  - name: persons
    description: Agents and customers.
  - name: categories
    description: Hierarchical, self-referencing ticket classification lookup data.
  - name: priorities
    description: Flat, manually-ranked ticket priority lookup data.
  - name: incidents
    description: Unplanned interruptions or reductions in quality of a service.
  - name: problems
    description: Root causes behind one or more Incidents.
  - name: changes
    description: Planned modifications to infrastructure or a service.
  - name: service-requests
    description: Routine requests for something, not a report of something broken.
  - name: tickets
    description: >
      Read-only cross-subtype ticket overview: one paginated stream over all four subtypes,
      addressed by the shared Ticket id (ADR-0001). Writes stay on each subtype's own endpoint.
  - name: comments
    description: >
      Activity/conversation entries on a ticket, nested under the shared Ticket id (ADR-0001) —
      serves all four subtypes uniformly.
paths:
  /api/setup:
    get:
      tags: [setup]
      summary: Check whether the first-run setup still needs to be completed.
      security: []
      responses:
        "default":
          $ref: "#/components/responses/DefaultProblem"
        "200":
          description: Setup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
    post:
      tags: [setup]
      summary: Create the first agent account. Refuses to run a second time.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "default":
          $ref: "#/components/responses/DefaultProblem"
        "201":
          description: The first agent was created.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/PersonModel"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "409":
          description: Setup was already completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/persons:
    parameters:
      - $ref: "#/components/parameters/ApiVersionHeader"
    get:
      tags: [persons]
      summary: List persons (paginated, optionally filtered by role).
      parameters:
        - name: role
          in: query
          required: false
          schema:
