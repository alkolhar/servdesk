spring.application.name=servdesk

# Flyway migrations are the only source of schema truth; Hibernate only ever validates its
# mappings against what Flyway already created, it never generates or alters schema itself.
spring.jpa.hibernate.ddl-auto=validate

# The JPA session must not outlive the service-layer transaction. Assemblers only ever call
# getId() on lazy associations (safe without an open session, since a Hibernate proxy's id is
# already known), so nothing in this codebase actually relies on open-in-view.
spring.jpa.open-in-view=false

# Without this, Boot's own MethodArgumentNotValidException handling (and any other
# ErrorResponse-implementing exception) falls back to the classic timestamp/error/trace body
# instead of RFC 7807 ProblemDetail, contradicting the documented error-response contract.
spring.mvc.problemdetails.enabled=true
